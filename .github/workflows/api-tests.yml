name: Moody API Test Suite - Newman CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    name: Run Postman Collection via Newman

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman and HTML reporter
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra

      - name: Create environment file with secrets
        run: |
          cat > environments/DEV-Moody-API.postman_environment.json << EOF
          {
            "id": "moody-dev-environment",
            "name": "DEV - Moody API",
            "values": [
              {
                "key": "base_url",
                "value": "https://reqres.in",
                "type": "default",
                "enabled": true
              },
              {
                "key": "api_key",
                "value": "${{ secrets.REQRES_API_KEY }}",
                "type": "secret",
                "enabled": true
              },
              {
                "key": "auth_token",
                "value": "",
                "type": "secret",
                "enabled": true
              },
              {
                "key": "user_id",
                "value": "",
                "type": "default",
                "enabled": true
              },
              {
                "key": "new_user_id",
                "value": "",
                "type": "default",
                "enabled": true
              }
            ],
            "_postman_variable_scope": "environment"
          }
          EOF

      - name: Run API tests
        run: |
          newman run collections/Moody-Credit-API-Suite.postman_collection.json \
            --environment environments/DEV-Moody-API.postman_environment.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export reports/test-report.html \
            --reporter-htmlextra-title "Moody Credit API Test Report" \
            --reporter-htmlextra-browserTitle "Moody API Tests" \
            --reporter-htmlextra-darkTheme \
            --color on \
            --suppress-exit-code

      - name: Upload HTML test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-report
          path: reports/test-report.html
          retention-days: 30
